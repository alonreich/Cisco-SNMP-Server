{% extends "base.html" %}
{% block title %}Device Management — SNMP Master{% endblock %}

{% block content %}
<div class="px-6 py-4 mb-6 bg-surface-800 rounded-2xl border border-surface-700 shadow-xl mx-auto" style="max-width: 760px;">
    <div class="flex flex-wrap items-center justify-between gap-6">
        <div class="flex items-center gap-4">
            <div class="p-2 bg-accent/10 rounded-xl">
                <i class="fas fa-edit text-accent text-base"></i>
            </div>
            <div>
                <h2 class="text-sm font-bold text-white uppercase tracking-widest">Device Management</h2>
                <p class="text-[10px] text-slate-400 uppercase font-bold tracking-widest mt-0.5">Add, Edit, or Remove Monitored SNMP Targets</p>
            </div>
        </div>
        <button onclick="showAddModal()" class="btn btn-primary text-xs uppercase font-bold py-2 px-5">
            <i class="fas fa-plus-circle mr-2"></i> Add New Device
        </button>
    </div>
</div>

<div class="bg-surface-800 rounded-xl border border-surface-700 shadow-xl overflow-x-auto mx-auto" style="max-width: 760px;">
    <table class="w-full text-sm min-w-[600px]">
        <thead>
            <tr class="text-[10px] font-bold text-slate-400 uppercase tracking-widest bg-surface-900/60">
                <th class="px-3 py-3 text-center align-middle"></th>
                <th class="px-3 py-3 text-left align-middle">IP Address</th>
                <th class="px-3 py-3 text-left align-middle">Hostname</th>
                <th class="px-3 py-3 text-center align-middle">Ver</th>
                <th class="px-3 py-3 text-left align-middle">Community</th>
                <th class="px-3 py-3 text-center align-middle">Type</th>
                <th class="px-3 py-3 text-center align-middle">Actions</th>
            </tr>
        </thead>
        <tbody id="devices_tbody"></tbody>
    </table>
</div>

<!-- ════════════════════════════════════════════════════════════════════════
     MODAL DIALOG
     ════════════════════════════════════════════════════════════════════════ -->
<div id="device_modal" class="fixed inset-0 bg-black/70 backdrop-blur-sm z-50 hidden items-center justify-center p-4" onclick="closeModal()">
    <div class="bg-surface-800 border border-surface-700 rounded-2xl shadow-2xl w-full max-w-sm my-8" onclick="event.stopPropagation()">
        <form id="device_form" onsubmit="saveDevice(event)">
            <input type="hidden" id="original_ip" name="original_ip">

            <!-- ── Header ── -->
            <div class="px-6 py-5 border-b border-surface-700 flex items-center gap-3">
                <div id="modal_icon" class="p-2.5 bg-accent/10 rounded-xl">
                    <i id="modal_icon_i" class="fas fa-plus-circle text-accent text-lg"></i>
                </div>
                <div>
                    <h3 id="modal_title" class="text-base font-bold text-white">Add New Device</h3>
                    <p class="text-[10px] text-slate-400 uppercase tracking-wider font-semibold mt-0.5">Configure SNMP Target</p>
                </div>
            </div>

            <!-- ── Body (scrollable) ── -->
            <div class="px-6 py-5 space-y-5 max-h-[60vh] overflow-y-auto custom-scrollbar">

                <!-- IP Address -->
                <div>
                    <label for="ip" class="form-label">IP Address</label>
                    <input type="text" id="ip" name="ip" class="form-input" placeholder="e.g. 10.160.4.1" required>
                </div>

                <!-- Device Type — visual cards -->
                <div>
                    <label class="form-label">Device Type</label>
                    <div class="grid grid-cols-3 gap-2" id="type_cards">
                        <button type="button" data-type="cisco" onclick="selectType('cisco')"
                            class="type-card group flex flex-col items-center gap-2 p-3 rounded-xl border-2 border-surface-700 bg-surface-900/50 hover:border-blue-500/50 transition-all">
                            <i class="fas fa-network-wired text-lg text-blue-400 group-hover:scale-110 transition-transform"></i>
                            <span class="text-xs font-bold text-slate-300 uppercase tracking-wide text-center leading-tight">Cisco<br>Switch</span>
                        </button>
                        <button type="button" data-type="esxi" onclick="selectType('esxi')"
                            class="type-card group flex flex-col items-center gap-2 p-3 rounded-xl border-2 border-surface-700 bg-surface-900/50 hover:border-green-500/50 transition-all">
                            <i class="fas fa-server text-lg text-green-400 group-hover:scale-110 transition-transform"></i>
                            <span class="text-xs font-bold text-slate-300 uppercase tracking-wide text-center leading-tight">VMware<br>ESXi</span>
                        </button>
                        <button type="button" data-type="vcsa" onclick="selectType('vcsa')"
                            class="type-card group flex flex-col items-center gap-2 p-3 rounded-xl border-2 border-surface-700 bg-surface-900/50 hover:border-purple-500/50 transition-all">
                            <i class="fas fa-cloud text-lg text-purple-400 group-hover:scale-110 transition-transform"></i>
                            <span class="text-xs font-bold text-slate-300 uppercase tracking-wide text-center leading-tight">VMware<br>VCSA</span>
                        </button>
                    </div>
                    <input type="hidden" id="target_type" name="target_type" value="cisco">
                </div>

                <!-- SNMP Version toggle -->
                <div>
                    <label class="form-label">SNMP Version</label>
                    <div class="grid grid-cols-2 gap-2">
                        <button type="button" id="btn_v2c" onclick="selectVersion('2c')"
                            class="ver-btn px-4 py-2.5 rounded-xl border-2 border-accent bg-accent/10 text-white font-bold text-xs uppercase tracking-wide transition-all">
                            v2c
                        </button>
                        <button type="button" id="btn_v3" onclick="selectVersion('3')"
                            class="ver-btn px-4 py-2.5 rounded-xl border-2 border-surface-700 bg-surface-900/50 text-slate-400 font-bold text-xs uppercase tracking-wide transition-all">
                            v3
                        </button>
                    </div>
                    <input type="hidden" id="snmp_version" name="snmp_version" value="2c">
                </div>

                <!-- v2c fields -->
                <div id="v2c_fields" class="space-y-1">
                    <label for="community" class="form-label">Community String</label>
                    <input type="text" id="community" name="community" class="form-input font-mono" placeholder="public">
                </div>

                <!-- v3 fields -->
                <div id="v3_fields" class="hidden space-y-4">
                    <div>
                        <label for="user" class="form-label">Username</label>
                        <input type="text" id="user" name="user" class="form-input" placeholder="snmpAdmin">
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label for="auth_protocol" class="form-label">Auth Protocol</label>
                            <select id="auth_protocol" name="auth_protocol" class="form-input">
                                <option value="sha">SHA</option>
                                <option value="md5">MD5</option>
                            </select>
                        </div>
                        <div>
                            <label for="auth_key" class="form-label">Auth Key</label>
                            <input type="password" id="auth_key" name="auth_key" class="form-input font-mono" placeholder="••••••••">
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label for="priv_protocol" class="form-label">Priv Protocol</label>
                            <select id="priv_protocol" name="priv_protocol" class="form-input">
                                <option value="aes">AES</option>
                                <option value="des">DES</option>
                            </select>
                        </div>
                        <div>
                            <label for="priv_key" class="form-label">Priv Key</label>
                            <input type="password" id="priv_key" name="priv_key" class="form-input font-mono" placeholder="••••••••">
                        </div>
                    </div>
                </div>
            </div>

            <!-- ── Footer ── -->
            <div class="px-6 py-4 bg-surface-900/40 flex justify-end gap-3 rounded-b-2xl border-t border-surface-700">
                <button type="button" onclick="closeModal()" class="btn btn-secondary text-xs uppercase font-bold py-2.5 px-5">Cancel</button>
                <button type="submit" class="btn btn-primary text-xs uppercase font-bold py-2.5 px-6">
                    <i class="fas fa-check mr-1.5"></i> Save
                </button>
            </div>
        </form>
    </div>
</div>

<style>
    .form-label {
        display: block;
        font-size: 10px;
        font-weight: 800;
        color: #94a3b8;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        margin-bottom: 0.375rem;
        text-align: left;
    }
    .form-input {
        width: 100%;
        background: #0f172a;
        border: 1px solid #334155;
        border-radius: 0.625rem;
        padding: 0.5rem 0.75rem;
        font-size: 0.8125rem;
        color: #ffffff;
        outline: none;
        transition: border-color 0.2s, box-shadow 0.2s;
    }
    .form-input:focus {
        border-color: #3b82f6;
        box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
    }
    .form-input::placeholder { color: #475569; }

    /* Selected type card */
    .type-card.selected {
        border-color: #3b82f6 !important;
        background: rgba(59, 130, 246, 0.1) !important;
    }
    .type-card.selected.green { border-color: #22c55e !important; background: rgba(34, 197, 94, 0.1) !important; }
    .type-card.selected.purple { border-color: #a855f7 !important; background: rgba(168, 85, 247, 0.1) !important; }

    /* Version button selected state */
    .ver-btn.selected {
        border-color: #3b82f6 !important;
        background: rgba(59, 130, 246, 0.12) !important;
        color: #ffffff !important;
    }
</style>

<script>
    const devices = {{ devices | tojson }};
    const detectedHostnames = {{ detected_hostnames | tojson }};
    const deviceStatus = {{ device_status | tojson }};
    let currentVersion = '2c';

    // ── Sort devices by IP numerically (each octet as integer) ──
    function ipToParts(ip) { return ip.split('.').map(Number); }
    function compareIPs(a, b) {
        const pa = ipToParts(a), pb = ipToParts(b);
        for (let i = 0; i < 4; i++) {
            if (pa[i] !== pb[i]) return pa[i] - pb[i];
        }
        return 0;
    }
    if (Array.isArray(devices)) devices.sort((a, b) => compareIPs(a.ip, b.ip));

    // ── Status indicator ──
    function statusIndicator(ip) {
        const ds = deviceStatus[ip];
        if (!ds) return '<span class="inline-block w-2.5 h-2.5 rounded-full bg-slate-600" title="Unknown"></span>';
        const status = ds.status;
        const lastSeen = ds.last_seen ? new Date(ds.last_seen).getTime() : 0;
        const now = Date.now();
        const fiveMinAgo = now - 5 * 60 * 1000;
        const oneHourAgo = now - 60 * 60 * 1000;

        if (status === 'online' && lastSeen >= fiveMinAgo) {
            return '<span class="inline-block w-2.5 h-2.5 rounded-full bg-green-500" style="box-shadow:0 0 6px #22c55e;" title="Online (last seen ' + new Date(lastSeen).toLocaleTimeString() + ')"></span>';
        } else if (status === 'online' || lastSeen >= oneHourAgo) {
            return '<span class="inline-block w-2.5 h-2.5 rounded-full bg-yellow-500" style="box-shadow:0 0 6px #eab308;" title="Stale (last seen ' + new Date(lastSeen).toLocaleString() + ')"></span>';
        } else {
            return '<span class="inline-block w-2.5 h-2.5 rounded-full bg-red-500" style="box-shadow:0 0 6px #ef4444;" title="Offline (last seen ' + (lastSeen ? new Date(lastSeen).toLocaleString() : 'never') + ')"></span>';
        }
    }

    const typeLabels = { cisco: 'Cisco Switch', esxi: 'VMware ESXi', vcsa: 'VMware VCSA' };
    const typeBadges = {
        cisco: '<span class="px-1.5 py-0.5 text-[8px] font-black rounded uppercase bg-blue-500/10 border border-blue-500/20 text-blue-400 whitespace-nowrap">Cisco</span>',
        esxi:  '<span class="px-1.5 py-0.5 text-[8px] font-black rounded uppercase bg-green-500/10 border border-green-500/20 text-green-400 whitespace-nowrap">ESXi</span>',
        vcsa:  '<span class="px-1.5 py-0.5 text-[8px] font-black rounded uppercase bg-purple-500/10 border border-purple-500/20 text-purple-400 whitespace-nowrap">VCSA</span>'
    };

    function renderDevices() {
        const tbody = document.getElementById('devices_tbody');
        if (!Array.isArray(devices) || devices.length === 0) {
            tbody.innerHTML = '<tr><td colspan="6" class="text-center py-12 text-slate-400">No devices configured.</td></tr>';
            return;
        }
        tbody.innerHTML = devices.map(d => {
            const hostname = detectedHostnames[d.ip] || '—';
            const badge = typeBadges[d.target_type] || typeBadges.cisco;
            return `
            <tr class="hover:bg-white/[0.02] transition-colors">
                <td class="px-2 py-2 text-center align-middle">${statusIndicator(d.ip)}</td>
                <td class="px-2 py-2 align-middle font-mono text-white text-xs whitespace-nowrap truncate" title="${d.ip}">${d.ip}</td>
                <td class="px-2 py-2 align-middle text-slate-300 text-xs truncate" style="max-width: 150px;" title="${hostname}">${hostname}</td>
                <td class="px-2 py-2 align-middle text-slate-300 text-xs text-center whitespace-nowrap">${d.snmp_version || '2c'}</td>
                <td class="px-2 py-2 align-middle font-mono text-slate-300 text-xs truncate" style="max-width: 95px;" title="${d.community || d.user || ''}">${d.community || d.user || 'N/A'}</td>
                <td class="px-2 py-2 align-middle text-center whitespace-nowrap">${badge}</td>
                <td class="px-2 py-2 align-middle text-center whitespace-nowrap">
                    <button onclick="showEditModal('${d.ip}')" class="btn btn-secondary p-1 h-8 w-8" title="Edit"><i class="fas fa-pen text-sm"></i></button>
                    <button onclick="deleteDevice('${d.ip}')" class="btn bg-red-500/10 text-red-400 hover:bg-red-500 hover:text-white p-1 h-8 w-8 ml-1" title="Remove"><i class="fas fa-trash text-sm"></i></button>
                </td>
            </tr>`;
        }).join('');
    }

    // ── Type card selection ──
    function selectType(type) {
        document.getElementById('target_type').value = type;
        document.querySelectorAll('.type-card').forEach(c => {
            c.classList.remove('selected', 'green', 'purple');
            if (c.dataset.type === type) {
                c.classList.add('selected');
                if (type === 'esxi') c.classList.add('green');
                if (type === 'vcsa') c.classList.add('purple');
            }
        });
    }

    // ── Version toggle ──
    function selectVersion(ver) {
        currentVersion = ver;
        document.getElementById('snmp_version').value = ver;
        document.getElementById('btn_v2c').classList.toggle('selected', ver === '2c');
        document.getElementById('btn_v3').classList.toggle('selected', ver === '3');
        // Non-selected fades back
        if (ver === '2c') {
            document.getElementById('btn_v2c').classList.remove('border-surface-700', 'bg-surface-900/50', 'text-slate-400');
            document.getElementById('btn_v3').classList.add('border-surface-700', 'bg-surface-900/50', 'text-slate-400');
        } else {
            document.getElementById('btn_v3').classList.remove('border-surface-700', 'bg-surface-900/50', 'text-slate-400');
            document.getElementById('btn_v2c').classList.add('border-surface-700', 'bg-surface-900/50', 'text-slate-400');
        }
        document.getElementById('v2c_fields').classList.toggle('hidden', ver !== '2c');
        document.getElementById('v3_fields').classList.toggle('hidden', ver !== '3');
    }

    function showModal() {
        const modal = document.getElementById('device_modal');
        modal.classList.remove('hidden');
        modal.classList.add('flex');
    }

    function closeModal() {
        const modal = document.getElementById('device_modal');
        modal.classList.add('hidden');
        modal.classList.remove('flex');
    }

    function showAddModal() {
        document.getElementById('device_form').reset();
        document.getElementById('original_ip').value = '';
        document.getElementById('ip').readOnly = false;
        document.getElementById('modal_title').textContent = 'Add New Device';
        document.getElementById('modal_icon_i').className = 'fas fa-plus-circle text-accent text-lg';
        selectType('cisco');
        selectVersion('2c');
        showModal();
    }

    function showEditModal(ip) {
        const device = devices.find(d => d.ip === ip);
        if (!device) return;

        document.getElementById('device_form').reset();
        document.getElementById('original_ip').value = device.ip;
        document.getElementById('ip').value = device.ip;
        document.getElementById('ip').readOnly = true;
        document.getElementById('modal_title').textContent = `Edit ${device.ip}`;
        document.getElementById('modal_icon_i').className = 'fas fa-pen text-accent text-lg';

        const version = device.snmp_version || '2c';
        selectVersion(version);

        if (version === '3') {
            document.getElementById('user').value = device.user || '';
            document.getElementById('auth_protocol').value = device.auth_protocol || 'sha';
            document.getElementById('auth_key').value = device.auth_key || '';
            document.getElementById('priv_protocol').value = device.priv_protocol || 'aes';
            document.getElementById('priv_key').value = device.priv_key || '';
        } else {
            document.getElementById('community').value = device.community || '';
        }

        const t = device.target_type || 'cisco';
        selectType(t);

        showModal();
    }

    function saveDevice(event) {
        event.preventDefault();
        const form = event.target;
        const formData = new FormData(form);
        const device = Object.fromEntries(formData.entries());
        const isEditing = device.original_ip !== '';

        // ── Duplicate IP detection (only for new devices, not edits) ──
        if (!isEditing) {
            const existing = devices.find(d => d.ip === device.ip);
            if (existing) {
                const typeLabel = typeLabels[existing.target_type] || existing.target_type || 'unknown';
                const commLabel = existing.community || existing.user || 'N/A';
                const confirmMsg =
                    `A device with IP ${device.ip} already exists:\n\n` +
                    `  Type: ${typeLabel}\n` +
                    `  SNMP: ${existing.snmp_version || '2c'}\n` +
                    `  Community/User: ${commLabel}\n\n` +
                    `Do you want to OVERWRITE the existing configuration with the new values?`;
                if (!confirm(confirmMsg)) {
                    return; // User chose not to overwrite
                }
                // Mark as update by setting original_ip so the server replaces instead of appending
                device.original_ip = device.ip;
            }
        }

        if (device.snmp_version === '2c') {
            delete device.user; delete device.auth_protocol;
            delete device.auth_key; delete device.priv_protocol; delete device.priv_key;
        } else {
            delete device.community;
        }

        fetch('/api/devices', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(device)
        }).then(res => res.json()).then(resp => {
            if (resp.status === 'ok') {
                let msg = 'Device saved! Restart the monitor for changes to take effect.';
                if (resp.corrected_type) {
                    const labels = { cisco: 'Cisco Switch', esxi: 'VMware ESXi', vcsa: 'VMware VCSA' };
                    msg = `Note: Device type auto-corrected from "${labels[device.target_type] || device.target_type}" to "${labels[resp.corrected_type]}" based on detected system information.\n\nRestart the monitor for changes to take effect.`;
                }
                alert(msg);
                window.location.reload();
            } else {
                alert('Error saving device.');
            }
        });
    }

    function deleteDevice(ip) {
        if (!confirm(`Remove device ${ip}? All historical data will be permanently deleted.`)) return;
        fetch(`/api/devices/${ip}`, { method: 'DELETE' }).then(res => {
            if (res.ok) {
                alert('Device removed and all data purged.');
                window.location.reload();
            } else {
                alert('Error removing device.');
            }
        });
    }

    // ESC to close
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

    document.addEventListener('DOMContentLoaded', () => {
        renderDevices();
        selectType('cisco');
        selectVersion('2c');
    });
</script>
{% endblock %}
