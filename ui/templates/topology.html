{% extends "base.html" %}
{% block title %}Logical Topology — SNMP Master{% endblock %}
{% block extra_head %}
<script src="https://cdn.jsdelivr.net/npm/vis-network@9.1.6/standalone/umd/vis-network.min.js?v={{ range(1, 999) | random }}"></script>
<style>
    #topology_container {
        width: 100%;
        height: calc(100vh - 120px);
        background: #020617;
        background-image: radial-gradient(#1e293b 1px, transparent 1px);
        background-size: 32px 32px;
        border-radius: 1rem;
        border: 1px solid #334155;
        position: relative;
        overflow: hidden;
        cursor: grab !important;
    }
    #topology_container:active { cursor: grabbing !important; }
    .vis-network { outline: none; }
    .util-bar { transition: width 0.3s ease, background-color 0.3s ease; }

    #device_filter {
        background: #020617;
        border: 1px solid #334155;
        color: #f8fafc;
        border-radius: 0.75rem;
        padding: 0.5rem 1rem;
        font-size: 11px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        cursor: pointer;
        outline: none;
        transition: all 0.2s;
    }
    #device_filter:hover { border-color: #3b82f6; color: #ffffff; }
    #device_filter:focus { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,0.2); }

    /* Zoom toolbar */
    #zoom_toolbar {
        position: absolute;
        bottom: 16px;
        right: 16px;
        display: flex;
        flex-direction: column;
        gap: 2px;
        background: rgba(2, 6, 23, 0.92);
        backdrop-filter: blur(8px);
        border: 1px solid #334155;
        border-radius: 0.75rem;
        padding: 4px;
        z-index: 20;
        box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    }
    #zoom_toolbar button {
        width: 36px;
        height: 36px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: transparent;
        border: none;
        color: #94a3b8;
        cursor: pointer;
        border-radius: 0.5rem;
        font-size: 14px;
        transition: all 0.15s;
    }
    #zoom_toolbar button:hover {
        background: rgba(59, 130, 246, 0.15);
        color: #60a5fa;
    }
    #zoom_toolbar button:active {
        background: rgba(59, 130, 246, 0.3);
    }
    #zoom_toolbar .zoom-divider {
        height: 1px;
        background: #334155;
        margin: 2px 4px;
    }
    #zoom_level {
        text-align: center;
        font-size: 9px;
        font-weight: 700;
        color: #64748b;
        padding: 2px 0;
        font-family: 'JetBrains Mono', monospace;
    }
</style>
{% endblock %}

{% block content %}
<div class="flex items-center justify-between mb-6">
    <div>
        <h1 class="text-sm font-bold text-white uppercase tracking-widest">Logical <span class="text-blue-300">Topology</span></h1>
        <p class="text-[11px] text-slate-400 uppercase tracking-widest font-semibold mt-1">L2/L3 Physical Path Mapping via LLDP & CDP</p>
    </div>
    <div class="flex items-center gap-3">
        <select id="device_filter" aria-label="Filter devices by type">
            <option value="cisco" selected>Cisco Switches</option>
            <option value="all">All</option>
            <option value="vcsa">VCSA</option>
            <option value="esxi">ESXi Hosts</option>
        </select>
        <button onclick="resetLayout()" class="btn bg-red-500/10 border border-red-500/20 text-red-400 hover:bg-red-500/20 text-xs uppercase font-bold px-5">
            <i class="fas fa-undo mr-2"></i> Reset
        </button>
    </div>
</div>

<div class="relative bg-surface-800 rounded-2xl border border-surface-700 shadow-2xl overflow-hidden">
    <button onclick="copyTopology(this)" aria-label="Copy Topology Layout" title="Copy Node Positions" class="absolute top-4 right-4 z-20 copy-btn p-2 rounded-xl bg-green-500/10 border border-green-500/20 text-green-400 hover:bg-green-500 hover:text-white transition-all cursor-pointer text-lg flex items-center justify-center w-10 h-10 shadow-lg">
        <i class="fas fa-copy"></i>
    </button>
    <div id="topology_container"></div>
    <div id="selection_box" style="display:none; position:absolute; border:1px dashed #eab308; background:rgba(234, 179, 8, 0.1); z-index:100; pointer-events:none;"></div>

    <!-- Legend -->
    <div class="absolute bottom-4 left-4 flex flex-wrap gap-4 bg-surface-900/90 backdrop-blur-md border border-surface-700 px-5 py-3 rounded-xl pointer-events-none select-none text-[11px] font-bold text-slate-300 uppercase tracking-tight shadow-xl">
        <div class="flex items-center gap-2">
            <span class="w-4 h-2.5 rounded-sm bg-accent border border-blue-300 shadow-[0_0_8px_rgba(59,130,246,0.6)]"></span> Network
        </div>
        <div class="flex items-center gap-2">
            <span class="w-4 h-4 rounded-sm bg-purple-700 border border-purple-400 shadow-[0_0_8px_rgba(167,139,250,0.4)]" style="clip-path: polygon(10% 0%, 90% 0%, 100% 40%, 90% 100%, 10% 100%, 0% 40%)"></span> Host
        </div>
        <div class="flex items-center gap-2">
            <span class="w-4 h-4 rounded-full bg-green-700 border border-green-400 shadow-[0_0_8px_rgba(34,197,94,0.4)]"></span> Instance
        </div>
        <div class="border-l border-surface-700 pl-4 flex gap-4">
            <span class="flex items-center gap-2"><span class="w-2.5 h-2.5 rounded-full bg-blue-600 shadow-[0_0_10px_#2563eb]"></span> Up</span>
            <span class="flex items-center gap-2"><span class="w-2.5 h-2.5 rounded-full bg-red-500 shadow-[0_0_10px_#ef4444]"></span> Down</span>
        </div>
    </div>

    <!-- Zoom Toolbar -->
    <div id="zoom_toolbar">
        <button onclick="zoomIn()" title="Zoom In"><i class="fas fa-plus"></i></button>
        <div id="zoom_level">100%</div>
        <button onclick="zoomOut()" title="Zoom Out"><i class="fas fa-minus"></i></button>
        <div class="zoom-divider"></div>
        <button onclick="zoomReset()" title="Reset Zoom & Fit"><i class="fas fa-expand"></i></button>
    </div>
</div>

<script>
    let network = null;
    let nodesDS = new vis.DataSet();
    let edgesDS = new vis.DataSet();
    const savedPositions = {{ positions | tojson if positions else '{}' }};

    let allDevices = [];
    let allLinks = [];
    let allPortChannels = [];

    function normalizeHostname(name) {
        if (!name) return '';
        return name.toLowerCase().trim().replace(/\.(bynetsec\.com|bynetsec\.local|local|com|net|org)$/, '');
    }

    function isDeviceMatch(d, remoteId) {
        if (!remoteId) return false;
        if (d.ip === remoteId) return true;
        if (!d.hostname) return false;
        return normalizeHostname(d.hostname) === normalizeHostname(remoteId);
    }

    function shortenIfName(name) {
        if (!name) return '';
        return name.replace(/FastEthernet/gi, 'Fa')
                   .replace(/GigabitEthernet/gi, 'Gi')
                   .replace(/TenGigabitEthernet/gi, 'Te')
                   .replace(/TwoGigabitEthernet/gi, 'Two')
                   .replace(/FiveGigabitEthernet/gi, 'Five')
                   .replace(/TwentyFiveGigE/gi, 'Twe')
                   .replace(/FortyGigabitEthernet/gi, 'Fo')
                   .replace(/HundredGigE/gi, 'Hu')
                   .replace(/Port-channel/gi, 'Po')
                   .replace(/Vlan/gi, 'Vl');
    }

    function normalizePortName(name) {
        if (!name) return '';
        let n = name.toLowerCase().trim();
        n = n.replace(/fastethernet/g, 'fa')
             .replace(/gigabitethernet/g, 'gi')
             .replace(/tengigabitethernet/g, 'te')
             .replace(/twogigabitethernet/g, 'two')
             .replace(/fivegigabitethernet/g, 'five')
             .replace(/twentyfivegige/g, 'twe')
             .replace(/fortygigabitethernet/g, 'fo')
             .replace(/hundredgige/g, 'hu')
             .replace(/port-channel/g, 'po')
             .replace(/ethernet/g, 'et');
        return n.replace(/([a-z]+)0\//g, '$1');
    }

    function isPhysicalPort(name) {
        if (!name) return false;
        const n = name.toLowerCase();
        if (n.includes('vlan') || n.includes('loopback') || n.includes('null') || n.includes('tunnel')) return false;
        if (n.includes(':') || /^[0-9a-f]{4}\.[0-9a-f]{4}\.[0-9a-f]{4}$/.test(n) || /^\d+$/.test(n)) return true;
        const prefixes = ['gi', 'fa', 'te', 'tw', 'fi', 'hu', 'po', 'et', 'ge', 'fe', 'vmnic', 'eth'];
        return prefixes.some(p => n.startsWith(p));
    }

    function classifyDevice(d) {
        if (d.target_type === 'vcsa') return 'vm';
        if (d.target_type === 'esxi') return 'esxi';
        if (d.target_type === 'vmware') return 'esxi';
        return 'switch';
    }

    function deviceCategory(d) {
        const dtype = classifyDevice(d);
        if (dtype === 'switch') return 'cisco';
        return 'vmware';
    }

    function buildNodeSVG(dtype, statusColor, showVMware, ip, nodeBorder) {
        const bg = '#0f172a';
        const fw = 2.5;
        const W = 130, H = 35;
        const content = `<rect x="${fw}" y="${fw}" width="${W - fw*2}" height="${H - fw*2}" rx="6" fill="${bg}" stroke="${nodeBorder || statusColor}" stroke-width="${fw}"/>
            <circle cx="${W - 12}" cy="12" r="4" fill="${statusColor}" />
            <text x="${W/2}" y="${H/2}" text-anchor="middle" dominant-baseline="central" fill="#ffffff" font-size="12" font-family="monospace" font-weight="bold">${ip}</text>`;
        return `<svg xmlns="http://www.w3.org/2000/svg" width="${W}" height="${H}" viewBox="0 0 ${W} ${H}">${content}</svg>`;
    }

    function nodeImage(dtype, statusColor, showVMware, ip, nodeBg) {
        const svg = buildNodeSVG(dtype, statusColor, showVMware, ip, nodeBg);
        return 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svg);
    }

    // ── Zoom controls ──
    function zoomIn()  { if (network) { network.moveTo({ scale: network.getScale() * 1.25, animation: { duration: 300, easingFunction: 'easeInOutQuad' } }); updateZoomLabel(); } }
    function zoomOut() { if (network) { network.moveTo({ scale: network.getScale() / 1.25, animation: { duration: 300, easingFunction: 'easeInOutQuad' } }); updateZoomLabel(); } }
    function zoomReset() { if (network) { network.fit({ animation: { duration: 600, easingFunction: 'easeInOutQuad' } }); setTimeout(updateZoomLabel, 650); } }
    function updateZoomLabel() { if (network) document.getElementById('zoom_level').textContent = Math.round(network.getScale() * 100) + '%'; }

    function buildNetwork(filterMode, isBackgroundUpdate = false) {
        const container = document.getElementById('topology_container');

        let filteredDevices = [];
        if (filterMode === 'cisco') {
            filteredDevices = allDevices.filter(d => classifyDevice(d) === 'switch');
        } else if (filterMode === 'vcsa') {
            filteredDevices = allDevices.filter(d => classifyDevice(d) === 'vm');
        } else if (filterMode === 'esxi') {
            filteredDevices = allDevices.filter(d => classifyDevice(d) === 'esxi');
        } else {
            filteredDevices = [...allDevices];
        }

        const filteredIPs = new Set(filteredDevices.map(d => d.ip));

        if (filterMode === 'esxi') {
            allLinks.forEach(l => {
                const remoteMatchesESXi = filteredDevices.find(d => isDeviceMatch(d, l.remote_id));
                if (remoteMatchesESXi && !filteredIPs.has(l.local_ip)) {
                    const localSwitch = allDevices.find(d => d.ip === l.local_ip);
                    if (localSwitch) {
                        filteredDevices.push(localSwitch);
                        filteredIPs.add(localSwitch.ip);
                    }
                }
            });
        }

        const now = Date.now();
        const oneHourAgo = now - 60 * 60 * 1000;

        // ── Determine staleness by last_seen only (status flips on momentary timeouts) ──
        const offlineDevices = filteredDevices.filter(d => {
            const lastSeen = d.last_seen ? new Date(d.last_seen).getTime() : 0;
            return lastSeen < oneHourAgo;
        });
        const staleIPs = new Set(offlineDevices.map(d => d.ip));

        // ── Generate Phantom Nodes ──
        if (filterMode === 'all' || filterMode === 'esxi') {
            allLinks.forEach(l => {
                if (!filteredIPs.has(l.local_ip)) return;
                const remoteDevice = filteredDevices.find(d => isDeviceMatch(d, l.remote_id));
                const isPhys = isPhysicalPort(l.local_port) && isPhysicalPort(l.remote_port);
                
                if (!remoteDevice && isPhys) {
                    const phantomDevice = {
                        ip: l.remote_id,
                        hostname: l.remote_id,
                        target_type: 'unknown',
                        isPhantom: true,
                        last_seen: new Date().toISOString()
                    };
                    filteredDevices.push(phantomDevice);
                    filteredIPs.add(l.remote_id);
                }
            });
        }

        // ── Build active links ──
        let filteredLinks = allLinks.filter(l => {
            const fromVisible = filteredIPs.has(l.local_ip);
            const toVisible = filteredIPs.has(l.remote_id) || Array.from(filteredIPs).some(ip => {
                const d = filteredDevices.find(x => x.ip === ip);
                return d && isDeviceMatch(d, l.remote_id);
            });
            const remoteDevice = filteredDevices.find(d => isDeviceMatch(d, l.remote_id));
            return fromVisible && remoteDevice;
        });

        // ── Determine which devices have active links (are "connected") ──
        const connectedIPs = new Set();
        filteredLinks.forEach(l => {
            connectedIPs.add(l.local_ip);
            const rd = filteredDevices.find(d => isDeviceMatch(d, l.remote_id));
            if (rd) connectedIPs.add(rd.ip);
        });

        // ── Isolated nodes: online but no links, or VCSA type (not part of physical topology) ──
        const isolatedDevices = filteredDevices.filter(d => {
            if (staleIPs.has(d.ip)) return false; // stale goes to offline stack
            const dtype = classifyDevice(d);
            // VCSA is always isolated (VM inside ESXi, not a physical topology node)
            if (dtype === 'vm') return true;
            // Any device with no active links is isolated
            return !connectedIPs.has(d.ip);
        });
        const isolatedIPs = new Set(isolatedDevices.map(d => d.ip));

        const currentPositions = network ? network.getPositions() : {};

        const nodeItems = filteredDevices.map(d => {
            const isStale = (() => {
                const lastSeenMs = d.last_seen ? new Date(d.last_seen).getTime() : 0;
                return lastSeenMs < oneHourAgo;
            })();
            const statusColor = isStale ? '#ef4444' : '#2563eb';
            const dtype = classifyDevice(d);
            const showVMware = (dtype === 'esxi' || dtype === 'vm');
            const isIsolated = isolatedIPs.has(d.ip);

            // ── Positioning logic ──
            let initialX, initialY, isFixed = false;

            if (isStale) {
                // OFFLINE: Stack vertically in far upper-left
                const offlineIndex = offlineDevices.indexOf(d);
                initialX = -1600;
                initialY = -500 + offlineIndex * 70;
                isFixed = true;
            } else if (isIsolated) {
                // ISOLATED (VCSA, no-link devices): Stack vertically in left column
                const isoIndex = isolatedDevices.indexOf(d);
                initialX = -900;
                initialY = -300 + isoIndex * 80;
                // Not fixed — user can still drag if they want
            } else {
                // ACTIVE: Use saved/UI positions or let physics decide
                initialX = currentPositions[d.ip]?.x;
                initialY = currentPositions[d.ip]?.y;

                if (initialX === undefined) {
                    initialX = savedPositions[d.ip]?.x;
                    initialY = savedPositions[d.ip]?.y;
                }

                if (initialX === undefined) {
                    if (dtype === 'switch') { initialX = 0; initialY = 0; }
                    else if (dtype === 'esxi') { initialX = 500; initialY = 0; }
                    else { initialX = 900; initialY = 0; }
                }
            }

            let sum = 0;
            for (let i = 0; i < d.ip.length; i++) { sum += d.ip.charCodeAt(i); }
            const hue = (sum * 47) % 360;
            const nodeBorder = isStale ? '#ef4444' : `hsl(${hue}, 80%, 65%)`;
            let labelTag = dtype.toUpperCase();
            if (isStale) labelTag += ' · OFFLINE';

            return {
                id: d.ip,
                x: initialX,
                y: initialY,
                fixed: isFixed,
                label: "",
                labelOverride: labelTag,
                shape: 'image',
                image: nodeImage(dtype, statusColor, showVMware, d.ip, nodeBorder),
                size: 35,
                statusColor: statusColor,
                nodeBorder: nodeBorder,
                textBg: isStale ? '#ef4444' : nodeBorder,
                color: { background: nodeBorder, border: nodeBorder },
                borderWidth: 0,
                shadow: { enabled: true, color: isStale ? 'rgba(239,68,68,0.5)' : 'rgba(0,0,0,0.6)', size: isStale ? 14 : 8, x: 0, y: 4 }
            };
        });

        // ── Build edges ──
        const edgeItems = [];
        const pairGroups = {};
        const seenCables = new Set();

        const poToPhys = {};
        allPortChannels.forEach(pc => {
            const key = `${pc.device_ip}:${pc.po_ifindex}`;
            if (!poToPhys[key]) poToPhys[key] = [];
            poToPhys[key].push(pc.phys_ifindex);
        });

        const ifIdxToDescr = {};
        allDevices.forEach(d => {
            if (d.interfaces) {
                d.interfaces.forEach(i => {
                    ifIdxToDescr[`${d.ip}:${i.index}`] = i.descr;
                });
            }
        });

        filteredLinks.forEach(l => {
            const remoteDevice = filteredDevices.find(d => isDeviceMatch(d, l.remote_id));
            if (remoteDevice && l.local_ip !== remoteDevice.ip) {
                const localEndPoint = `${l.local_ip}:${normalizePortName(l.local_port)}`;
                const remoteEndPoint = `${remoteDevice.ip}:${normalizePortName(l.remote_port)}`;
                const cableKey = [localEndPoint, remoteEndPoint].sort().join('|');

                if (!seenCables.has(cableKey)) {
                    seenCables.add(cableKey);
                    l.resolvedRemoteIp = remoteDevice.ip;

                    let localLabel = shortenIfName(l.local_port);
                    let remoteLabel = shortenIfName(l.remote_port);

                    if (l.local_port.toLowerCase().startsWith('po')) {
                        const localDevice = allDevices.find(d => d.ip === l.local_ip);
                        const poIface = localDevice?.interfaces?.find(i => normalizePortName(i.descr) === normalizePortName(l.local_port));
                        if (poIface) {
                            const members = allPortChannels.filter(pc => pc.device_ip === l.local_ip && pc.po_ifindex === poIface.index);
                            if (members.length > 0) {
                                const memberNames = members.map(m => {
                                    const descr = ifIdxToDescr[`${l.local_ip}:${m.phys_ifindex}`];
                                    return shortenIfName(descr || m.phys_ifindex);
                                });
                                localLabel += ` (${memberNames.join(',')})`;
                            }
                        }
                    }

                    if (l.remote_port.toLowerCase().startsWith('po')) {
                        const rIface = remoteDevice?.interfaces?.find(i => normalizePortName(i.descr) === normalizePortName(l.remote_port));
                        if (rIface) {
                            const members = allPortChannels.filter(pc => pc.device_ip === remoteDevice.ip && pc.po_ifindex === rIface.index);
                            if (members.length > 0) {
                                const memberNames = members.map(m => {
                                    const descr = ifIdxToDescr[`${remoteDevice.ip}:${m.phys_ifindex}`];
                                    return shortenIfName(descr || m.phys_ifindex);
                                });
                                remoteLabel += ` (${memberNames.join(',')})`;
                            }
                        }
                    }

                    l.smartLocalLabel = localLabel;
                    l.smartRemoteLabel = remoteLabel;

                    const pairKey = [l.local_ip, remoteDevice.ip].sort().join('-');
                    if (!pairGroups[pairKey]) pairGroups[pairKey] = [];
                    pairGroups[pairKey].push(l);
                }
            }
        });

        Object.keys(pairGroups).forEach(pairKey => {
            const group = pairGroups[pairKey];
            const numEdges = group.length;
            const pairNodes = pairKey.split('-');
            const pFrom = pairNodes[0], pTo = pairNodes[1];

            group.forEach((l, i) => {
                const isForward = (l.local_ip === pFrom);
                const localPortName = l.smartLocalLabel;
                const remotePortName = l.smartRemoteLabel;

                let type = 'continuous';
                let roundness = 0;
                if (numEdges > 1) {
                    const offsetIndex = i - (numEdges - 1) / 2;
                    if (offsetIndex === 0) {
                        type = 'continuous';
                        roundness = 0;
                    } else {
                        type = offsetIndex > 0 ? 'curvedCW' : 'curvedCCW';
                        roundness = Math.abs(offsetIndex) * 0.3;
                    }
                }

                edgeItems.push({
                    id: `${l.local_ip}-${l.local_port}-${l.resolvedRemoteIp}-${l.remote_port}`,
                    from: pFrom,
                    to: pTo,
                    title: isForward ? `${localPortName} \u2194 ${remotePortName}` : `${remotePortName} \u2194 ${localPortName}`,
                    localPort: isForward ? localPortName : remotePortName,
                    remotePort: isForward ? remotePortName : localPortName,
                    arrows: {
                        to: { enabled: true, scaleFactor: 0.8, type: 'arrow' },
                        from: { enabled: true, scaleFactor: 0.8, type: 'arrow' }
                    },
                    color: { inherit: 'both', opacity: 0.8 },
                    width: l.local_port.toLowerCase().startsWith('po') ? 5 : 3,
                    length: 320,
                    smooth: { enabled: true, type: type, roundness: roundness }
                });
            });
        });

        nodesDS.update(nodeItems);
        edgesDS.update(edgeItems);

        const newNodeIds = new Set(nodeItems.map(n => n.id));
        nodesDS.getIds().forEach(id => { if (!newNodeIds.has(id)) nodesDS.remove(id); });
        const newEdgeIds = new Set(edgeItems.map(e => e.id));
        edgesDS.getIds().forEach(id => { if (!newEdgeIds.has(id)) edgesDS.remove(id); });

        // ── Options: physics for initial layout, then OFF; free drag; multiselect ──
        const options = {
            nodes: { chosen: false, shapeProperties: { useBorderWithImage: false, useImageSize: true } },
            edges: { chosen: false, hoverWidth: 3, selectionWidth: 4 },
            interaction: {
                hover: true,
                dragNodes: true,
                dragView: true,
                zoomView: true,          // mouse wheel zoom
                selectable: true,
                multiselect: true,        // Ctrl+click adds to selection
                navigationButtons: false,
                tooltipDelay: 200
            },
            physics: {
                enabled: true,            // ON for initial stabilization
                solver: 'forceAtlas2Based',
                forceAtlas2Based: { gravitationalConstant: -300, centralGravity: 0.008, springLength: 280, springConstant: 0.04, damping: 0.6 },
                stabilization: { iterations: 300, updateInterval: 25 }
            },
            manipulation: { enabled: false }
        };

        if (!network) {
            network = new vis.Network(container, { nodes: nodesDS, edges: edgesDS }, options);

            // ── Custom drawing: node labels + edge port labels ──
            network.on("afterDrawing", (ctx) => {
                const positions = network.getPositions();
                nodesDS.forEach((nodeData) => {
                    const pos = positions[nodeData.id];
                    if (!pos) return;
                    const x = pos.x, y = pos.y;
                    const title = nodeData.labelOverride;
                    if (!title) return;
                    const isOfflineLabel = title.includes('OFFLINE');
                    ctx.font = "bold 8.5px Inter, system-ui, sans-serif";
                    ctx.textAlign = "center"; ctx.textBaseline = "bottom";
                    ctx.strokeStyle = "#1e293b"; ctx.lineWidth = 3;
                    ctx.strokeText(title, x, y - 28);
                    if (isOfflineLabel) ctx.fillStyle = "#ef4444";
                    else ctx.fillStyle = "#cbd5e1";
                    ctx.fillText(title, x, y - 28);
                });

                edgesDS.forEach((edgeData) => {
                    try {
                        const fromId = edgeData.from, toId = edgeData.to;
                        const posFrom = positions[fromId], posTo = positions[toId];
                        if (!posFrom || !posTo) return;
                        const xFrom = posFrom.x, yFrom = posFrom.y;
                        const xTo = posTo.x, yTo = posTo.y;
                        const dx = xTo - xFrom, dy = yTo - yFrom;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist === 0) return;
                        const ux = dx / dist, uy = dy / dist;
                        const px = -uy, py = ux;
                        const a = 65, b = 18;
                        const r = 1.0 / Math.sqrt((ux * ux) / (a * a) + (uy * uy) / (b * b));

                        let offset = dist * 0.30;
                        if (offset < r + 10) offset = Math.min(r + 10, dist * 0.45);

                        let curveSign = 0;
                        if (edgeData.smooth.type === 'curvedCW') curveSign = 1;
                        else if (edgeData.smooth.type === 'curvedCCW') curveSign = -1;
                        const R = edgeData.smooth.roundness || 0;
                        const curveShiftAmount = 4 * R * (offset / dist) * (1 - offset / dist) * dist * curveSign;
                        const sx = px * curveShiftAmount, sy = py * curveShiftAmount;

                        const x1 = xFrom + ux * offset + sx, y1 = yFrom + uy * offset + sy;
                        const x2 = xTo - ux * offset + sx, y2 = yTo - uy * offset + sy;

                        ctx.font = "bold 9px monospace"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
                        const localPort = edgeData.localPort, remotePort = edgeData.remotePort;
                        const fromNodeData = nodesDS.get(fromId), toNodeData = nodesDS.get(toId);
                        const colorFrom = fromNodeData ? fromNodeData.nodeBorder : "#2563eb";
                        const colorTo = toNodeData ? toNodeData.nodeBorder : "#2563eb";
                        const textBgFrom = fromNodeData ? fromNodeData.textBg : "#93c5fd";
                        const textBgTo = toNodeData ? toNodeData.textBg : "#c084fc";

                        const labelPointerLen = 12;
                        const cx1 = x1 + px * labelPointerLen, cy1 = y1 + py * labelPointerLen;
                        const cx2 = x2 - px * labelPointerLen, cy2 = y2 - py * labelPointerLen;

                        if (localPort) {
                            ctx.strokeStyle = "#475569"; ctx.lineWidth = 1.5;
                            ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(cx1, cy1); ctx.stroke();
                            const w = ctx.measureText(localPort).width + 8;
                            ctx.fillStyle = "rgba(15, 23, 42, 0.95)"; ctx.strokeStyle = colorFrom; ctx.lineWidth = 1.5;
                            ctx.beginPath(); if (ctx.roundRect) ctx.roundRect(cx1 - w / 2, cy1 - 8, w, 16, 4); else ctx.rect(cx1 - w / 2, cy1 - 8, w, 16);
                            ctx.fill(); ctx.stroke();
                            ctx.fillStyle = textBgFrom; ctx.fillText(localPort, cx1, cy1);
                        }
                        if (remotePort) {
                            ctx.strokeStyle = "#475569"; ctx.lineWidth = 1.5;
                            ctx.beginPath(); ctx.moveTo(x2, y2); ctx.lineTo(cx2, cy2); ctx.stroke();
                            const w = ctx.measureText(remotePort).width + 8;
                            ctx.fillStyle = "rgba(15, 23, 42, 0.95)"; ctx.strokeStyle = colorTo; ctx.lineWidth = 1.5;
                            ctx.beginPath(); if (ctx.roundRect) ctx.roundRect(cx2 - w / 2, cy2 - 8, w, 16, 4); else ctx.rect(cx2 - w / 2, cy2 - 8, w, 16);
                            ctx.fill(); ctx.stroke();
                            ctx.fillStyle = textBgTo; ctx.fillText(remotePort, cx2, cy2);
                        }
                    } catch (err) { console.error("Error drawing edge labels:", err); }
                });
            });

            // ── Cursor feedback ──
            network.on("hoverNode", () => { container.style.setProperty('cursor', 'pointer', 'important'); });
            network.on("blurNode", () => { container.style.setProperty('cursor', 'grab', 'important'); });
            network.on("hoverEdge", () => { container.style.setProperty('cursor', 'pointer', 'important'); });
            network.on("blurEdge", () => { container.style.setProperty('cursor', 'grab', 'important'); });

            // ── Drag: nodes stay where dropped, group drag works via multiselect ──
            network.on("dragStart", (params) => {
                if (!params.nodes.length && !params.edges.length) {
                    container.style.setProperty('cursor', 'grabbing', 'important');
                }
            });
            network.on("dragEnd", (params) => {
                container.style.setProperty('cursor', 'grab', 'important');
                // If nodes were dragged (single or multi), fix them in place
                if (params.nodes && params.nodes.length > 0) {
                    params.nodes.forEach(id => {
                        const pos = network.getPositions([id])[id];
                        nodesDS.update({ id, x: pos.x, y: pos.y });
                    });
                }
                saveLayout();
            });

            // ── After stabilization: disable physics so nodes stay where dragged ──
            network.once("stabilizationIterationsDone", () => {
                network.setOptions({ physics: { enabled: false } });
                network.fit({ animation: { duration: 800, easingFunction: 'easeInOutQuad' } });
                setTimeout(updateZoomLabel, 850);
            });

            // ── Wheel zoom + middle-click reset ──
            // vis-network handles wheel zoom natively (zoomView: true).
            // Add middle-click detection for reset:
            container.addEventListener('mousedown', (e) => {
                if (e.button === 1) { // middle click
                    e.preventDefault();
                    zoomReset();
                }
            });

            // ── Rubberband Selection (Right Click) ──
            const selectionBox = document.getElementById('selection_box');
            let isSelecting = false;
            let selectionRect = {};
            
            container.addEventListener('contextmenu', e => e.preventDefault());

            container.addEventListener('mousedown', e => {
                if (e.button === 2) {
                    if (network.getSelectedNodes().length > 0) {
                        network.unselectAll();
                        return;
                    }
                    e.preventDefault();
                    isSelecting = true;
                    const containerRect = container.getBoundingClientRect();
                    selectionRect.startX = e.clientX - containerRect.left;
                    selectionRect.startY = e.clientY - containerRect.top;
                    selectionBox.style.left = selectionRect.startX + 'px';
                    selectionBox.style.top = selectionRect.startY + 'px';
                    selectionBox.style.width = '0px';
                    selectionBox.style.height = '0px';
                    selectionBox.style.display = 'block';
                    network.setOptions({interaction: {dragView: false}});
                }
            });

            container.addEventListener('mousemove', e => {
                if (isSelecting) {
                    const containerRect = container.getBoundingClientRect();
                    const currentX = e.clientX - containerRect.left;
                    const currentY = e.clientY - containerRect.top;
                    const left = Math.min(selectionRect.startX, currentX);
                    const top = Math.min(selectionRect.startY, currentY);
                    const width = Math.abs(selectionRect.startX - currentX);
                    const height = Math.abs(selectionRect.startY - currentY);

                    selectionBox.style.left = left + 'px';
                    selectionBox.style.top = top + 'px';
                    selectionBox.style.width = width + 'px';
                    selectionBox.style.height = height + 'px';
                }
            });

            container.addEventListener('mouseup', e => {
                if (e.button === 2 && isSelecting) {
                    isSelecting = false;
                    selectionBox.style.display = 'none';
                    network.setOptions({interaction: {dragView: true}});

                    const containerRect = container.getBoundingClientRect();
                    const currentX = e.clientX - containerRect.left;
                    const currentY = e.clientY - containerRect.top;
                    const left = Math.min(selectionRect.startX, currentX);
                    const top = Math.min(selectionRect.startY, currentY);
                    const width = Math.abs(selectionRect.startX - currentX);
                    const height = Math.abs(selectionRect.startY - currentY);

                    if (width < 5 && height < 5) return; // Ignore right click if it was just a click

                    const canvasLeft = network.DOMtoCanvas({x: left, y: top});
                    const canvasRight = network.DOMtoCanvas({x: left + width, y: top + height});

                    const minX = Math.min(canvasLeft.x, canvasRight.x);
                    const maxX = Math.max(canvasLeft.x, canvasRight.x);
                    const minY = Math.min(canvasLeft.y, canvasRight.y);
                    const maxY = Math.max(canvasLeft.y, canvasRight.y);

                    const positions = network.getPositions();
                    const selectedNodes = [];
                    for (const nodeId in positions) {
                        const pos = positions[nodeId];
                        // W=130, H=35 for our SVG nodes. Check if center falls inside bounding box
                        if (pos.x >= minX && pos.x <= maxX && pos.y >= minY && pos.y <= maxY) {
                            selectedNodes.push(nodeId);
                        }
                    }
                    network.selectNodes(selectedNodes);
                }
            });

            document.addEventListener('keydown', e => {
                if (e.key === 'Escape') {
                    if (isSelecting) {
                        isSelecting = false;
                        selectionBox.style.display = 'none';
                        if (network) network.setOptions({interaction: {dragView: true}});
                    }
                    if (network) network.unselectAll();
                }
            });

            // ── Marching Ants for Selected Nodes ──
            let antOffset = 0;
            setInterval(() => {
                if (network && network.getSelectedNodes().length > 0) {
                    antOffset++;
                    if (antOffset > 16) antOffset = 0;
                    network.redraw();
                }
            }, 60);

            network.on("beforeDrawing", ctx => {
                const selectedNodes = network.getSelectedNodes();
                if (selectedNodes.length === 0) return;
                
                const positions = network.getPositions(selectedNodes);
                ctx.save();
                ctx.lineWidth = 1;
                ctx.strokeStyle = "rgba(234, 179, 8, 1)"; // gentle yellow (#eab308)
                ctx.setLineDash([4, 4]);
                ctx.lineDashOffset = -antOffset;

                for (const id of selectedNodes) {
                    const pos = positions[id];
                    if (!pos) continue;
                    ctx.beginPath();
                    // Node SVG is W=130, H=35 centered around pos.x, pos.y
                    if (ctx.roundRect) {
                        ctx.roundRect(pos.x - 65 - 3, pos.y - 17.5 - 3, 130 + 6, 35 + 6, 6);
                    } else {
                        ctx.rect(pos.x - 65 - 3, pos.y - 17.5 - 3, 130 + 6, 35 + 6);
                    }
                    ctx.stroke();
                }
                ctx.restore();
            });

            // Track zoom changes to update label
            network.on("zoom", updateZoomLabel);

        } else {
            // Network exists — rebuild with new filter data
            if (!isBackgroundUpdate) {
                network.setOptions(options);
                network.once("stabilizationIterationsDone", () => {
                    network.setOptions({ physics: { enabled: false } });
                    network.fit({ animation: { duration: 800, easingFunction: 'easeInOutQuad' } });
                    setTimeout(updateZoomLabel, 850);
                });
                network.stabilize();
            }
        }
    }

    async function initTopology() {
        const savedType = localStorage.getItem('topology_filter');
        if (savedType) {
            document.getElementById('device_filter').value = savedType;
        } else {
            document.getElementById('device_filter').value = 'cisco';
            localStorage.setItem('topology_filter', 'cisco');
        }

        const response = await fetch(`/api/topology?t=${Date.now()}`);
        const data = await response.json();

        allDevices = data.devices;
        allLinks = data.links;
        allPortChannels = data.port_channels || [];

        const filter = document.getElementById('device_filter').value;
        buildNetwork(filter);
    }

    document.getElementById('device_filter').addEventListener('change', function() {
        localStorage.setItem('topology_filter', this.value);
        buildNetwork(this.value, false);
    });

    function saveLayout() {
        if (!network) return;
        const pos = network.getPositions();
        fetch('/api/topology/positions', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(pos)
        });
    }

    function resetLayout() {
        if (confirm("Reset topology map to default layout? This will clear all manual positions.")) {
            fetch('/api/topology/positions', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({})
            }).then(() => window.location.reload());
        }
    }

    document.addEventListener('DOMContentLoaded', initTopology);

    socket.on('device_update', (data) => {
        if (data.devices) allDevices = data.devices;
        if (data.links) allLinks = data.links;
        if (data.port_channels) allPortChannels = data.port_channels;

        const filter = document.getElementById('device_filter').value;
        buildNetwork(filter, true);
    });

    function copyTopology(btn) {
        let textToCopy = "{}";
        if (network) {
            textToCopy = JSON.stringify(network.getPositions(), null, 2);
        }

        function showSuccess() {
            const originalHTML = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-check text-white"></i>';
            btn.classList.remove('bg-green-500/10', 'border-green-500/20', 'text-green-400');
            btn.classList.add('bg-green-500', 'border-green-600', 'text-white', 'cursor-default');
            btn.disabled = true;
            
            setTimeout(() => {
                btn.innerHTML = originalHTML;
                btn.classList.add('bg-green-500/10', 'border-green-500/20', 'text-green-400');
                btn.classList.remove('bg-green-500', 'border-green-600', 'text-white', 'cursor-default');
                btn.disabled = false;
            }, 2000);
        }

        if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(textToCopy).then(showSuccess).catch(err => console.error('Failed to copy text: ', err));
        } else {
            const textArea = document.createElement("textarea");
            textArea.value = textToCopy;
            textArea.style.position = "fixed";
            document.body.appendChild(textArea);
            textArea.focus();
            textArea.select();
            try {
                document.execCommand('copy');
                showSuccess();
            } catch (err) {
                console.error('Fallback copy failed', err);
            }
            document.body.removeChild(textArea);
        }
    }
</script>
