<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Cisco SNMP Master{% endblock %}</title>
    <script src="/static/tailwind.min.js?v={{ range(1, 999) | random }}"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        surface: { 
                            900: '#334155', // Brightened background (Slate 700)
                            800: '#3f4e65', // Lighter surface
                            700: '#475569', // Borders and Hover
                            600: '#64748b'  // Muted text and high-contrast borders
                        },
                        accent: { DEFAULT: '#3b82f6', dim: '#2563eb', glow: '#93c5fd' },
                    },
                    fontFamily: {
                        mono: ['JetBrains Mono', 'Consolas', 'monospace'],
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                },
            },
        };
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body { 
            background: #334155;
            color: #f1f5f9;
            font-family: 'Inter', system-ui, sans-serif;
            margin: 0;
            overflow-x: hidden;
            line-height: 1.5;
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #334155; }
        ::-webkit-scrollbar-thumb { background: #64748b; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        .nav-link { 
            padding: 0.625rem 1.125rem; 
            border-radius: 0.5rem; 
            transition: all 0.2s ease; 
            color: #cbd5e1;
            font-weight: 600;
            font-size: 0.875rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            text-decoration: none;
        }
        .nav-link:hover { color: #ffffff; background: rgba(255,255,255,0.08); }
        .nav-link.active { background: #3b82f6; color: white; box-shadow: 0 4px 12px rgba(59, 130, 246, 0.4); }

        .btn { 
            padding: 0.625rem 1.25rem; 
            border-radius: 0.5rem; 
            font-size: 0.875rem; 
            cursor: pointer; 
            transition: all 0.2s; 
            border: none; 
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }
        .btn-primary { background: #3b82f6; color: white; }
        .btn-primary:hover { background: #2563eb; transform: translateY(-1px); }
        .btn-secondary { background: #475569; color: #f1f5f9; border: 1px solid #64748b; }
        .btn-secondary:hover { background: #64748b; }

        input, select { 
            background: #1e293b; 
            border: 1px solid #475569; 
            color: #f1f5f9; 
            border-radius: 0.5rem; 
            padding: 0.5rem 0.875rem;
            font-size: 0.875rem;
            transition: all 0.2s;
        }
        input:focus, select:focus { border-color: #3b82f6; outline: none; ring: 2px solid rgba(59,130,246,0.25); }

        .status-dot { width: 10px; height: 10px; border-radius: 50%; }
        .bg-up { background-color: #22c55e; box-shadow: 0 0 8px #22c55e; }
        .bg-down { background-color: #ef4444; box-shadow: 0 0 8px #ef4444; }

        /* Modal / Sidebar for details */
        #details_panel {
            position: fixed;
            right: -500px;
            top: 0;
            width: 500px;
            height: 100vh;
            background: #3f4e65;
            border-left: 1px solid #64748b;
            z-index: 1000;
            transition: right 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 2.5rem;
            overflow-y: auto;
            box-shadow: -12px 0 30px rgba(0,0,0,0.4);
        }
        #details_panel.open { right: 0; }
        .close-btn { position: absolute; top: 1.5rem; right: 1.5rem; cursor: pointer; color: #cbd5e1; }
        .close-btn:hover { color: white; }

        /* Mobile nav drawer */
        #mobile_nav_overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(15,23,42,0.75);
            backdrop-filter: blur(4px);
            z-index: 900;
        }
        #mobile_nav_overlay.open { display: block; }
        #mobile_nav_drawer {
            position: fixed;
            top: 0;
            left: -320px;
            width: 320px;
            height: 100vh;
            background: #3f4e65;
            border-right: 1px solid #64748b;
            z-index: 950;
            transition: left 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        #mobile_nav_drawer.open { left: 0; }
        #mobile_nav_drawer .nav-link { font-size: 1rem; padding: 1rem 1.25rem; }
    </style>
    <script>
        const socket = io();

        function escapeHtml(text) {
            if (text === null || text === undefined) return '';
            const div = document.createElement('div');
            div.textContent = String(text);
            return div.innerHTML;
        }
    </script>
    {% block extra_head %}{% endblock %}
</head>
<body>
    <nav class="sticky top-0 z-50 px-6 py-3 flex items-center justify-between border-b border-surface-700" style="background: rgba(51, 65, 85, 0.9); backdrop-filter: blur(12px);">
        <div class="flex items-center gap-4">
            <div class="p-2 bg-accent rounded-xl shadow-lg shadow-accent/20">
                <i class="fas fa-network-wired text-white text-base"></i>
            </div>
            <span class="text-base font-bold tracking-tight text-white">SNMP<span class="text-blue-300">MASTER</span></span>
        </div>
        <div class="hidden md:flex items-center space-x-2">
            <a href="/" class="nav-link {% if request.path == '/' %}active{% endif %}">
                <i class="fas fa-th-large"></i> Dashboard
            </a>
            <a href="/troubleshooting" class="nav-link {% if request.path == '/troubleshooting' %}active{% endif %}">
                <i class="fas fa-project-diagram"></i> Topology
            </a>
            <a href="/cpu" class="nav-link {% if request.path == '/cpu' %}active{% endif %}">
                <i class="fas fa-microchip"></i> CPU
            </a>
            <a href="/memory" class="nav-link {% if request.path == '/memory' %}active{% endif %}">
                <i class="fas fa-memory"></i> Memory
            </a>
            <a href="/config-history" class="nav-link {% if request.path == '/config-history' %}active{% endif %}">
                <i class="fas fa-history"></i> Configs
            </a>
        </div>
        <div class="flex items-center gap-4">
            <button id="mobile_menu_btn" class="md:hidden p-2 text-slate-300 hover:text-white" aria-label="Open navigation menu" onclick="toggleMobileNav()">
                <i class="fas fa-bars text-xl"></i>
            </button>
            <div id="ws_status" class="flex items-center gap-2 text-xs font-semibold text-slate-100 bg-surface-700 px-4 py-1.5 rounded-full border border-surface-600">
                <span class="w-2.5 h-2.5 rounded-full bg-yellow-500 shadow-[0_0_8px_#eab308]"></span> Connecting
            </div>
        </div>
    </nav>

    <div id="mobile_nav_overlay" onclick="toggleMobileNav()"></div>
    <div id="mobile_nav_drawer">
        <div class="flex items-center justify-between mb-8">
            <span class="text-lg font-bold text-white">Menu</span>
            <button onclick="toggleMobileNav()" aria-label="Close navigation menu" class="text-slate-300 hover:text-white text-3xl">&times;</button>
        </div>
        <a href="/" class="nav-link {% if request.path == '/' %}active{% endif %}"><i class="fas fa-th-large"></i> Dashboard</a>
        <a href="/troubleshooting" class="nav-link {% if request.path == '/troubleshooting' %}active{% endif %}"><i class="fas fa-project-diagram"></i> Topology</a>
        <a href="/cpu" class="nav-link {% if request.path == '/cpu' %}active{% endif %}"><i class="fas fa-microchip"></i> CPU</a>
        <a href="/memory" class="nav-link {% if request.path == '/memory' %}active{% endif %}"><i class="fas fa-memory"></i> Memory</a>
        <a href="/config-history" class="nav-link {% if request.path == '/config-history' %}active{% endif %}"><i class="fas fa-history"></i> Configs</a>
    </div>

    <main class="max-w-screen-2xl mx-auto px-4 sm:px-6 lg:px-8 py-4 min-h-screen">
        {% block content %}{% endblock %}
    </main>

    <div id="details_panel" role="dialog" aria-modal="true" aria-label="Device details">
        <button class="close-btn text-3xl" onclick="closeDetails()" aria-label="Close details panel">&times;</button>
        <div id="details_content"></div>
    </div>

    <script>
        function toggleMobileNav() {
            const overlay = document.getElementById('mobile_nav_overlay');
            const drawer = document.getElementById('mobile_nav_drawer');
            const isOpen = drawer.classList.contains('open');
            if (isOpen) {
                overlay.classList.remove('open');
                drawer.classList.remove('open');
            } else {
                overlay.classList.add('open');
                drawer.classList.add('open');
                drawer.querySelector('a.active')?.focus() || drawer.querySelector('a').focus();
            }
        }

        socket.on('connect', () => {
            const el = document.getElementById('ws_status');
            if (el) el.innerHTML = '<span class="w-2.5 h-2.5 rounded-full bg-green-500 animate-pulse shadow-[0_0_10px_#22c55e]"></span> Live';
        });
        socket.on('disconnect', () => {
            const el = document.getElementById('ws_status');
            if (el) el.innerHTML = '<span class="w-2.5 h-2.5 rounded-full bg-red-500 shadow-[0_0_10px_#ef4444]"></span> Offline';
        });

        let _lastFocusedElement = null;

        function showDetails(ip) {
            _lastFocusedElement = document.activeElement;
            const panel = document.getElementById('details_panel');
            const content = document.getElementById('details_content');
            content.innerHTML = '<div class="flex items-center justify-center h-64"><i class="fas fa-circle-notch fa-spin text-4xl text-accent"></i></div>';
            panel.classList.add('open');

            fetch(`/api/device/${encodeURIComponent(ip)}/details`)
                .then(r => r.json())
                .then(data => {
                    const d = data.device;
                    if (!d || Object.keys(d).length === 0) {
                        content.innerHTML = `
                            <h2 class="text-xl font-bold mb-1 text-white">Device Not Found</h2>
                            <p class="text-accent-glow font-mono text-base mb-6">${escapeHtml(ip)}</p>
                            <p class="text-slate-300">Basic telemetry for this target is currently unavailable.</p>
                        `;
                        return;
                    }
                    content.innerHTML = `
                        <h2 id="details_heading" class="text-xl font-bold mb-1 text-white">${escapeHtml(d.hostname || d.ip)}</h2>
                        <p class="text-accent-glow font-mono text-base mb-8">${escapeHtml(d.ip)}</p>
                        
                        <div class="space-y-8">
                            <section>
                                <h3 class="text-xs font-bold uppercase text-slate-400 mb-3 tracking-widest">System Specification</h3>
                                <div class="bg-surface-900 p-4 rounded-xl border border-surface-700 shadow-inner">
                                    <p class="text-sm text-slate-200"><span class="text-slate-500 font-medium">Model:</span> ${escapeHtml(d.sys_descr ? d.sys_descr.split(',')[0] : 'N/A')}</p>
                                    <p class="text-sm text-slate-200 mt-2"><span class="text-slate-500 font-medium">Uptime:</span> ${escapeHtml(d.sys_uptime || 'N/A')}</p>
                                </div>
                            </section>

                            <section>
                                <h3 class="text-xs font-bold uppercase text-slate-400 mb-3 tracking-widest">Telemetry Overview</h3>
                                <div class="grid grid-cols-2 gap-4">
                                    ${d.target_type !== 'vmware' ? `
                                    <div class="bg-surface-900 p-4 rounded-xl border border-surface-700 shadow-inner">
                                        <p class="text-xs text-slate-500 font-bold mb-1">CPU Load</p>
                                        <p class="text-2xl font-black text-white">${d.cpu || 0}%</p>
                                    </div>
                                    ` : `
                                    <div class="bg-surface-900 p-4 rounded-xl border border-surface-700 shadow-inner">
                                        <p class="text-xs text-slate-500 font-bold mb-1">Platform</p>
                                        <p class="text-sm font-black text-purple-300">VMware ${escapeHtml((d.hostname || '').toLowerCase().includes('esxi') ? 'ESXi' : 'VCSA/VM')}</p>
                                    </div>
                                    `}
                                    <div class="bg-surface-900 p-4 rounded-xl border border-surface-700 shadow-inner">
                                        <p class="text-xs text-slate-500 font-bold mb-1">Network Status</p>
                                        <p class="text-2xl font-black ${d.status === 'online' ? 'text-green-400' : 'text-red-400'}">${escapeHtml(d.status ? d.status.toUpperCase() : 'UNKNOWN')}</p>
                                    </div>
                                </div>
                                ${d.target_type === 'vmware' ? `
                                <p class="text-xs text-slate-500 mt-3 italic opacity-75">Notice: Real-time CPU/Memory metrics are unavailable for VMware vSphere via standard SNMP MIBs.</p>
                                ` : ''}
                            </section>

                            <section>
                                <h3 class="text-xs font-bold uppercase text-slate-400 mb-3 tracking-widest">Operational Alerts</h3>
                                <div class="space-y-3">
                                    ${data.alerts && data.alerts.length ? data.alerts.map(a => `
                                        <div class="p-4 bg-red-500/10 border border-red-500/20 rounded-xl">
                                            <p class="font-black text-red-400 text-xs tracking-wider uppercase">${escapeHtml(a.severity ? a.severity.toUpperCase() : '')}</p>
                                            <p class="text-slate-200 mt-1.5 text-sm leading-relaxed">${escapeHtml(a.message)}</p>
                                            <p class="text-slate-500 mt-2 text-[11px] font-mono">${escapeHtml(a.timestamp ? a.timestamp.replace('T', ' ').substring(0,19) : '')}</p>
                                        </div>
                                    `).join('') : '<div class="p-8 text-center border-2 border-dashed border-surface-700 rounded-xl text-slate-500 text-sm">No active alerts recorded.</div>'}
                                </div>
                            </section>
                        </div>
                    `;
                    panel.querySelector('.close-btn').focus();
                });
        }

        function closeDetails() {
            const panel = document.getElementById('details_panel');
            panel.classList.remove('open');
            if (_lastFocusedElement) {
                _lastFocusedElement.focus();
                _lastFocusedElement = null;
            }
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                const panel = document.getElementById('details_panel');
                if (panel && panel.classList.contains('open')) closeDetails();
                const drawer = document.getElementById('mobile_nav_drawer');
                if (drawer && drawer.classList.contains('open')) toggleMobileNav();
            }
        });

        document.addEventListener('keydown', (e) => {
            const panel = document.getElementById('details_panel');
            if (!panel || !panel.classList.contains('open')) return;
            if (e.key !== 'Tab') return;
            const focusable = panel.querySelectorAll('button, [href], input, select, textarea, [tabindex]:not([tabindex="-1"])');
            if (focusable.length === 0) return;
            const first = focusable[0];
            const last = focusable[focusable.length - 1];
            if (e.shiftKey) {
                if (document.activeElement === first) { e.preventDefault(); last.focus(); }
            } else {
                if (document.activeElement === last) { e.preventDefault(); first.focus(); }
            }
        });
    </script>
</body>
</html>
